<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Optimizer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        #map { height: calc(100vh - 2rem); border-radius: 1rem; }
       
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 p-4 text-gray-800 font-sans h-screen flex gap-4">

    <div class="w-1/3 bg-white rounded-2xl shadow-xl p-6 flex flex-col gap-6 overflow-y-auto">
        <div>
            <h1 class="text-2xl font-bold text-blue-600">Route Optimizer Pro</h1>
            <p class="text-sm text-gray-500">Interactive Map & Fare Splitter</p>
        </div>

        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
            <h2 class="font-semibold mb-3">Vehicle Configuration</h2>
            <div class="grid grid-cols-3 gap-2 text-sm">
                <div>
                    <label class="text-xs text-gray-500">Fuel (₹/L)</label>
                    <input type="number" id="fuel" value="94.77" class="w-full p-2 border rounded mt-1">
                </div>
                <div>
                    <label class="text-xs text-gray-500">Mileage (km/L)</label>
                    <input type="number" id="mileage" value="15.0" class="w-full p-2 border rounded mt-1">
                </div>
                <div>
                    <label class="text-xs text-gray-500">Wear (₹/km)</label>
                    <input type="number" id="wear" value="2.0" class="w-full p-2 border rounded mt-1">
                </div>
            </div>
        </div>

        <div>
            <h2 class="font-semibold mb-2">Map Controls</h2>
            <ul class="text-sm space-y-2 text-gray-600">
                <li class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Click map to set <b>Driver Start</b></li>
                <li class="flex items-center gap-2"><span class="w-3 h-3 bg-red-500 rounded-full"></span> Click map to set <b>Office Destination</b></li>
                <li class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> Click map to add <b>Passengers</b></li>
            </ul>
        </div>

        <button onclick="clearMap()" class="text-sm text-red-500 underline text-left">Reset Map</button>

        <button onclick="runOptimization()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg">
            Calculate Optimal Route
        </button>

        <div id="resultsBox" class="hidden bg-gray-50 p-4 rounded-xl border border-gray-200">
            <h3 class="font-bold text-lg mb-2">Trip Breakdown</h3>
            <div class="flex justify-between border-b pb-2 mb-2">
                <span class="text-gray-600">Algorithmic Distance:</span>
                <span id="resDist" class="font-bold text-blue-600">0 km</span>
            </div>
            <div class="flex justify-between border-b pb-2 mb-2">
                <span class="text-gray-600">Total Cost:</span>
                <span id="resCost" class="font-bold text-green-600">₹0</span>
            </div>
            <div id="faresList" class="space-y-1 text-sm"></div>
        </div>
    </div>

    <div class="w-2/3">
        <div id="map" class="shadow-xl shadow-inner"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script>
        const map = L.map('map').setView([28.6139, 77.2090], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let pins = []; 
        let routeLayer = null;

        const iconStart = L.divIcon({className: 'bg-green-500 w-4 h-4 rounded-full border-2 border-white shadow-md'});
        const iconEnd = L.divIcon({className: 'bg-red-500 w-4 h-4 rounded-full border-2 border-white shadow-md'});
        const iconPass = L.divIcon({className: 'bg-blue-500 w-4 h-4 rounded-full border-2 border-white shadow-md'});

        map.on('click', function(e) {
            let type = pins.length === 0 ? 'Driver' : (pins.length === 1 ? 'Office' : `Passenger ${pins.length - 1}`);
            let icon = pins.length === 0 ? iconStart : (pins.length === 1 ? iconEnd : iconPass);
            
            let marker = L.marker([e.latlng.lat, e.latlng.lng], {icon: icon}).addTo(map)
                .bindTooltip(type, {permanent: true, direction: 'right'}).openTooltip();
            
            pins.push({ lat: e.latlng.lat, lng: e.latlng.lng, marker: marker, type: type });
        });

        function clearMap() {
            pins.forEach(p => map.removeLayer(p.marker));
            if(routeLayer) map.removeControl(routeLayer);
            pins = [];
            document.getElementById('resultsBox').classList.add('hidden');
        }

        
        function getDistance(p1, p2) {
            const R = 6371; 
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function runOptimization() {
            if (pins.length < 3) return alert("Please place a Driver, Office, and at least 1 Passenger.");

            
            let nodes = [pins[0]]; 
            for(let i=2; i<pins.length; i++) nodes.push(pins[i]);
            nodes.push(pins[1]);

            let numPassengers = nodes.length - 2;
            let matrix = Array(nodes.length).fill().map(() => Array(nodes.length).fill(0));
            
            for (let i = 0; i < nodes.length; i++) {
                for (let j = 0; j < nodes.length; j++) {
                    matrix[i][j] = getDistance(nodes[i], nodes[j]);
                }
            }

            let directDistances = [];
            for (let i = 0; i <= numPassengers; i++) {
                directDistances.push(getDistance(nodes[i], nodes[nodes.length - 1]));
            }

            const data = {
                numPassengers: numPassengers,
                fuelPrice: parseFloat(document.getElementById('fuel').value),
                mileage: parseFloat(document.getElementById('mileage').value),
                wearTear: parseFloat(document.getElementById('wear').value),
                directDistances: directDistances,
                matrix: matrix
            };

            const response = await fetch('/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            
            if(routeLayer) map.removeControl(routeLayer);
            
            
            let waypoints = result.route.map(index => L.latLng(nodes[index].lat, nodes[index].lng));

            
            routeLayer = L.Routing.control({
                waypoints: waypoints,
                routeWhileDragging: false,
                addWaypoints: false,
                show: false, // Hides the bulky text directions
                lineOptions: {
                    styles: [{color: '#1a73e8', opacity: 0.8, weight: 5}] 
                },
                createMarker: function() { return null; } // Don't draw extra ugly markers
            }).addTo(map);

            
            document.getElementById('resultsBox').classList.remove('hidden');
            document.getElementById('resDist').innerText = result.optimal_distance.toFixed(2) + " km";
            document.getElementById('resCost').innerText = "₹" + result.total_cost.toFixed(2);
            
            let faresHtml = `<div class="flex justify-between"><span class="font-medium">Driver:</span> <span>₹${result.fares[0].toFixed(2)}</span></div>`;
            for(let i=1; i<=numPassengers; i++) {
                faresHtml += `<div class="flex justify-between"><span class="font-medium">Passenger ${i}:</span> <span>₹${result.fares[i].toFixed(2)}</span></div>`;
            }
            document.getElementById('faresList').innerHTML = faresHtml;
        }
    </script>
</body>
</html>
